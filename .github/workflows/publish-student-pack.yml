name: Publish Student Pack

on:
  push:
    branches:
      - main
    paths:
      - course-pack/student-pack/**
      - _config.yml
      - scripts/build_student_pages.sh
      - .github/workflows/publish-student-pack.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build student site source
        run: bash scripts/build_student_pages.sh

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .pages-build
          destination: .pages-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4